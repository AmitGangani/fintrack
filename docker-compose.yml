services:
  postgres-auth:
    image: postgres:18.3
    container_name: fintrack-postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql

  postgres-account:
    image: postgres:18.3
    container_name: fintrack-postgres-account
    environment:
      POSTGRES_DB: account_db
      POSTGRES_USER: account_user
      POSTGRES_PASSWORD: account_password
    ports:
      - "5434:5432"
    volumes:
      - postgres_account_data:/var/lib/postgresql

  postgres-transaction:
    image: postgres:18.3
    container_name: fintrack-postgres-transaction
    environment:
      POSTGRES_DB: transaction_db
      POSTGRES_USER: transaction_user
      POSTGRES_PASSWORD: transaction_password
    ports:
      - "5435:5432"
    volumes:
      - postgres_transaction_data:/var/lib/postgresql

volumes:
  postgres_auth_data:
  postgres_account_data:
  postgres_transaction_data: