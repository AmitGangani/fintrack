services:
  postgres-auth:
    image: postgres:18.3
    container_name: fintrack-postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-account:
    image: postgres:18.3
    container_name: fintrack-postgres-account
    environment:
      POSTGRES_DB: account_db
      POSTGRES_USER: account_user
      POSTGRES_PASSWORD: account_password
    ports:
      - "5434:5432"
    volumes:
      - postgres_account_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U account_user -d account_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-transaction:
    image: postgres:18.3
    container_name: fintrack-postgres-transaction
    environment:
      POSTGRES_DB: transaction_db
      POSTGRES_USER: transaction_user
      POSTGRES_PASSWORD: transaction_password
    ports:
      - "5435:5432"
    volumes:
      - postgres_transaction_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transaction_user -d transaction_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-budget:
    image: postgres:18.3
    container_name: fintrack-postgres-budget
    environment:
      POSTGRES_DB: budget_db
      POSTGRES_USER: budget_user
      POSTGRES_PASSWORD: budget_password
    ports:
      - "5436:5432"
    volumes:
      - postgres_budget_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budget_user -d budget_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./auth-service
    container_name: fintrack-auth-service
    environment:
      DB_URL: jdbc:postgresql://postgres-auth:5432/auth_db
      DB_USERNAME: auth_user
      DB_PASSWORD: auth_password
      JWT_SECRET: MDEyMzQ1Njc4OUFCQ0RFRjAxMjM0NTY3ODlBQkNERUY=
      JWT_EXPIRATION_MS: 86400000
    ports:
      - "8081:8081"
    depends_on:
      postgres-auth:
        condition: service_healthy

  kafka:
    image: apache/kafka:4.1.0
    container_name: fintrack-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

  account-service:
    build:
      context: ./account-service
    container_name: fintrack-account-service
    environment:
      DB_URL: jdbc:postgresql://postgres-account:5432/account_db
      DB_USERNAME: account_user
      DB_PASSWORD: account_password
      JWT_SECRET: MDEyMzQ1Njc4OUFCQ0RFRjAxMjM0NTY3ODlBQkNERUY=
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8082:8082"
    depends_on:
      postgres-account:
        condition: service_healthy
      kafka:
        condition: service_started

  transaction-service:
    build:
      context: ./transaction-service
    container_name: fintrack-transaction-service
    environment:
      DB_URL: jdbc:postgresql://postgres-transaction:5432/transaction_db
      DB_USERNAME: transaction_user
      DB_PASSWORD: transaction_password
      JWT_SECRET: MDEyMzQ1Njc4OUFCQ0RFRjAxMjM0NTY3ODlBQkNERUY=
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8083:8083"
    depends_on:
      postgres-transaction:
        condition: service_healthy
      kafka:
        condition: service_started

  budget-service:
    build:
      context: ./budget-service
    container_name: fintrack-budget-service
    environment:
      DB_URL: jdbc:postgresql://postgres-budget:5432/budget_db
      DB_USERNAME: budget_user
      DB_PASSWORD: budget_password
      JWT_SECRET: MDEyMzQ1Njc4OUFCQ0RFRjAxMjM0NTY3ODlBQkNERUY=
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8084:8084"
    depends_on:
      postgres-budget:
        condition: service_healthy
      kafka:
        condition: service_started

  api-gateway:
    build:
      context: ./api-gateway
    container_name: fintrack-api-gateway
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      ACCOUNT_SERVICE_URL: http://account-service:8082
      TRANSACTION_SERVICE_URL: http://transaction-service:8083
      BUDGET_SERVICE_URL: http://budget-service:8084
      JWT_SECRET: MDEyMzQ1Njc4OUFCQ0RFRjAxMjM0NTY3ODlBQkNERUY=
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_started
      account-service:
        condition: service_started
      transaction-service:
        condition: service_started
      budget-service:
        condition: service_started

volumes:
  postgres_auth_data:
  postgres_account_data:
  postgres_transaction_data:
  postgres_budget_data:
