server:
  port: 8084

spring:
  application:
    name: budget-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5436/budget_db}
    username: ${DB_USERNAME:budget_user}
    password: ${DB_PASSWORD:budget_password}

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET:MDEyMzQ1Njc4OUFCQ0RFRjAxMjM0NTY3ODlBQkNERUY=}

services:
  transaction-service:
    url: ${TRANSACTION_SERVICE_URL:http://localhost:8083}