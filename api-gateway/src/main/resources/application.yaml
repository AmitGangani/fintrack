server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service-route
              uri: ${AUTH_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/auth/**

            - id: account-service-route
              uri: ${ACCOUNT_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/accounts/**

            - id: transaction-service-route
              uri: ${TRANSACTION_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/transactions/**

            - id: budget-service-route
              uri: ${BUDGET_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/api/budgets/**

management:
  endpoints:
    web:
      exposure:
        include: health,info