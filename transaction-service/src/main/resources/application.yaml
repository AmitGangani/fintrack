server:
  port: 8083

spring:
  application:
    name: transaction-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5435/transaction_db}
    username: ${DB_USERNAME:transaction_user}
    password: ${DB_PASSWORD:transaction_password}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET:MDEyMzQ1Njc4OUFCQ0RFRjAxMjM0NTY3ODlBQkNERUY=}

services:
  account-service:
    url: ${ACCOUNT_SERVICE_URL:http://localhost:8082}