server:
  port: 8083

spring:
  application:
    name: transaction-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5435/transaction_db}
    username: ${DB_USERNAME:transaction_user}
    password: ${DB_PASSWORD:transaction_password}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET:MDEyMzQ1Njc4OUFCQ0RFRjAxMjM0NTY3ODlBQkNERUY=}

services:
  account-service:
    url: ${ACCOUNT_SERVICE_URL:http://localhost:8082}